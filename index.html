<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeDoDare</title>
    
    <!-- Google AdSense Verification -->
    <meta name="google-adsense-account" content="ca-pub-9849199172217987">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9849199172217987" crossorigin="anonymous"></script>

    <!-- 
      TODO: 구글 서치 콘솔(Google Search Console) 소유권 확인용 메타 태그
      아래 주석을 해제하고 'YOUR_VERIFICATION_CODE' 부분에 발급받은 코드를 붙여넣으세요.

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #09090b; /* 매우 짙은 다크 모드 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        .container {
            text-align: center;
            opacity: 0;
            animation: fadeIn 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.25em;
            margin: 0;
            text-transform: uppercase;
            /* 은은한 그라데이션 텍스트 효과 */
            background: linear-gradient(to right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn {
            0% { 
                opacity: 0; 
                transform: translateY(20px); 
                filter: blur(5px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* 데스크톱 크기에 맞춘 반응형 폰트 크기 */
        @media (min-width: 768px) {
            h1 {
                font-size: 4rem;
                letter-spacing: 0.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WeDoDare</h1>
    </div>
</body>
</html>
